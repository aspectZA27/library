<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <title>Library</title>
  </head>
  <body>
    <div class="main">
      <h1 class="heading">Library</h1>
      <button id="viewBooks" class="books" onclick="popupBooks()">
        View Books
      </button>
    </div>
    <p class="description">
      Welcome to the library! Here you can find a collection of books and
      resources.
    </p>

    <div class="booksContainer" id="booksContainer">
      <h1>Books:</h1>
      <div class="bookList" id="bookList"></div>
    </div>
    <div>
      <button class="addBook" id="popup" onclick="popup()" class="">
        Add Book
      </button>
      <form id="form">
        <input type="text" id="title" placeholder="Title" />
        <input type="text" id="author" placeholder="Author" />
        <input
          type="text"
          id="publicationYear"
          placeholder="Publication Year"
        />
        <input type="text" id="genre" placeholder="Genre" />
        <textarea id="summary" placeholder="Summary"></textarea>
        <button type="submit" onsubmit="addBook()">Add Book</button>
      </form>
    </div>
  </body>
  <script src="index.js"></script>
</html>
